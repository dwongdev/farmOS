services:
  _defaults:
    autowire: true
  farm_structure.map_render_event_subscriber:
    class: Drupal\farm_structure\EventSubscriber\MapRenderEventSubscriber
    tags:
      - { name: 'event_subscriber' }

  Drupal\farm_structure\Hook\FarmStructureHooks:
    class: Drupal\farm_structure\Hook\FarmStructureHooks
    autowire: true

  Drupal\farm_structure\Hook\FarmStructureViewsExecutionHooks:
    class: Drupal\farm_structure\Hook\FarmStructureViewsExecutionHooks
    autowire: true
