services:
  _defaults:
    autowire: true
  access_policy.managed_role_permissions:
    class: Drupal\farm_role\Access\ManagedRolePermissionsAccessPolicy
    arguments: ['@entity_type.manager', '@plugin.manager.managed_role_permissions']
    tags:
      - { name: access_policy }
  plugin.manager.managed_role_permissions:
    class: Drupal\farm_role\ManagedRolePermissionsManager
  Drupal\farm_role\ManagedRolePermissionsManagerInterface: '@plugin.manager.managed_role_permissions'
