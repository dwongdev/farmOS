farm_log_workflow:
  id: farm_log_workflow
  group: log
  label: 'farmOS Log Workflow'
  states:
    done:
      label: Done
    pending:
      label: Pending
    abandoned:
      label: Abandoned
  transitions:
    done:
      label: 'Done'
      from: [pending, abandoned]
      to: done
    to_pending:
      label: 'Move to Pending'
      from: [done, abandoned]
      to: pending
    to_abandoned:
      label: 'Abandon'
      from: [done, pending]
      to: abandoned
