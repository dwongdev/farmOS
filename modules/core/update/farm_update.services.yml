services:
  _defaults:
    autowire: true
  logger.channel.farm_update:
    parent: logger.channel_base
    arguments:
      $channel: 'farm_update'
  farm.update:
    class: Drupal\farm_update\FarmUpdate
  Drupal\farm_update\FarmUpdateInterface: '@farm.update'

  Drupal\farm_update\Hook\FarmUpdateHooks:
    class: Drupal\farm_update\Hook\FarmUpdateHooks
    autowire: true
