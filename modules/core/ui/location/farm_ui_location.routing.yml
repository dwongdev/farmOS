farm.locations:
  path: '/locations'
  defaults:
    _title: 'Locations'
    _form: \Drupal\farm_ui_location\Form\LocationHierarchyForm
  requirements:
    _permission: 'access locations overview'
    _asset_collection_access: 'TRUE'

farm.asset.locations:
  path: '/asset/{asset}/locations'
  defaults:
    _title_callback: \Drupal\farm_ui_location\Form\ParentLocationHierarchyForm::getTitle
    _form: \Drupal\farm_ui_location\Form\ParentLocationHierarchyForm
  requirements:
    _custom_access: \Drupal\farm_ui_location\Form\ParentLocationHierarchyForm::access
    _module_dependencies: asset
    asset: \d+
  options:
    parameters:
      asset:
        type: entity:asset

farm.organization.locations:
  path: '/organization/{organization}/locations'
  defaults:
    _title_callback: Drupal\farm_ui_location\Form\OrganizationLocationHierarchyForm::getTitle
    _form: Drupal\farm_ui_location\Form\OrganizationLocationHierarchyForm
  requirements:
    _entity_access: organization.view
    _module_dependencies: farm_farm
  options:
    parameters:
      organization:
        type: entity:organization
        bundle:
          - farm
