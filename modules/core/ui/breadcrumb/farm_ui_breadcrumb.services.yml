services:
  _defaults:
    autowire: true
  farm_ui_breadcrumb.breadcrumb:
    class: Drupal\farm_ui_breadcrumb\Breadcrumb\FarmBreadcrumbBuilder
    arguments:
      $context: '@router.request_context'
      $router: '@router.no_access_checks'
    tags:
      - { name: breadcrumb_builder, priority: 100 }
