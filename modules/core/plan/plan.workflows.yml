plan_default:
  id: plan_default
  group: plan
  label: 'Default'
  states:
    planning:
      label: Planning
    active:
      label: Active
    done:
      label: Done
    abandoned:
      label: Abandoned
  transitions:
    to_planning:
      label: 'To Planning'
      from: [active, done, abandoned]
      to: planning
    to_active:
      label: 'To active'
      from: [planning, done, abandoned]
      to: active
    to_done:
      label: 'To done'
      from: [planning, active, abandoned]
      to: done
    to_abandoned:
      label: 'To abandoned'
      from: [planning, active, done]
      to: abandoned
